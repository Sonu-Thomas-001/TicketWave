<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Clouds -->
  <ellipse cx="80" cy="70" rx="40" ry="18" fill="rgba(255,255,255,0.08)"/>
  <ellipse cx="320" cy="50" rx="35" ry="14" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="180" cy="200" rx="50" ry="16" fill="rgba(255,255,255,0.05)"/>
  <!-- Plane fuselage -->
  <ellipse cx="200" cy="125" rx="120" ry="18" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Nose -->
  <path d="M320 125 L355 125" stroke="rgba(255,255,255,0.25)" stroke-width="4" stroke-linecap="round"/>
  <!-- Left wing -->
  <path d="M170 125 L140 80 L220 125 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Right wing -->
  <path d="M170 125 L140 170 L220 125 Z" fill="rgba(255,255,255,0.12)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Tail -->
  <path d="M85 125 L65 95 L95 125 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.2)" stroke-width="1"/>
  <!-- Windows -->
  <circle cx="200" cy="120" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="215" cy="120" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="230" cy="120" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="245" cy="120" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="260" cy="120" r="3" fill="rgba(255,255,255,0.3)"/>
  <circle cx="275" cy="120" r="3" fill="rgba(255,255,255,0.3)"/>
  <text x="200" y="45" fill="white" font-family="Arial,sans-serif" font-size="20" font-weight="bold" text-anchor="middle" opacity="0.9">FLIGHT</text>
  <text x="200" y="235" fill="white" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" opacity="0.5">Travel by air</text>
</svg>
