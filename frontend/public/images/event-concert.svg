<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Stage lights -->
  <circle cx="120" cy="30" r="18" fill="rgba(255,255,255,0.12)"/>
  <circle cx="200" cy="20" r="22" fill="rgba(255,255,255,0.15)"/>
  <circle cx="280" cy="30" r="18" fill="rgba(255,255,255,0.12)"/>
  <!-- Light beams -->
  <polygon points="120,48 80,180 160,180" fill="rgba(255,255,255,0.04)"/>
  <polygon points="200,42 150,180 250,180" fill="rgba(255,255,255,0.05)"/>
  <polygon points="280,48 240,180 320,180" fill="rgba(255,255,255,0.04)"/>
  <!-- Stage -->
  <rect x="60" y="175" width="280" height="10" rx="3" fill="rgba(255,255,255,0.15)"/>
  <!-- Microphone stand -->
  <rect x="198" y="130" width="4" height="45" fill="rgba(255,255,255,0.25)"/>
  <circle cx="200" cy="125" r="10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Music notes -->
  <text x="100" y="110" fill="rgba(255,255,255,0.2)" font-size="28">♪</text>
  <text x="290" y="100" fill="rgba(255,255,255,0.15)" font-size="24">♫</text>
  <text x="320" y="140" fill="rgba(255,255,255,0.12)" font-size="20">♪</text>
  <text x="75" y="150" fill="rgba(255,255,255,0.1)" font-size="22">♫</text>
  <!-- Crowd silhouette -->
  <ellipse cx="120" cy="210" rx="25" ry="18" fill="rgba(255,255,255,0.08)"/>
  <ellipse cx="160" cy="215" rx="22" ry="16" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="200" cy="208" rx="28" ry="20" fill="rgba(255,255,255,0.09)"/>
  <ellipse cx="240" cy="215" rx="22" ry="16" fill="rgba(255,255,255,0.06)"/>
  <ellipse cx="280" cy="210" rx="25" ry="18" fill="rgba(255,255,255,0.08)"/>
  <text x="200" y="60" fill="white" font-family="Arial,sans-serif" font-size="20" font-weight="bold" text-anchor="middle" opacity="0.9">LIVE CONCERT</text>
  <text x="200" y="240" fill="white" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" opacity="0.5">Music &amp; Entertainment</text>
</svg>
