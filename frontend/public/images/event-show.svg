<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="showBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3b82f6;stop-opacity:1" />
    </linearGradient>
    <radialGradient id="spotShow" cx="50%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:white;stop-opacity:0.2" />
      <stop offset="100%" style="stop-color:white;stop-opacity:0" />
    </radialGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" fill="url(#showBg)" rx="12"/>
  <rect width="400" height="250" fill="url(#spotShow)" rx="12"/>
  <!-- Stage platform -->
  <rect x="40" y="180" width="320" height="60" rx="6" fill="white" opacity="0.1"/>
  <rect x="40" y="180" width="320" height="5" rx="2" fill="white" opacity="0.25"/>
  <!-- Spotlights from top -->
  <polygon points="100,0 60,180 140,180" fill="white" opacity="0.06"/>
  <polygon points="200,0 160,180 240,180" fill="white" opacity="0.08"/>
  <polygon points="300,0 260,180 340,180" fill="white" opacity="0.06"/>
  <ellipse cx="100" cy="10" rx="15" ry="8" fill="white" opacity="0.3"/>
  <ellipse cx="200" cy="10" rx="15" ry="8" fill="white" opacity="0.4"/>
  <ellipse cx="300" cy="10" rx="15" ry="8" fill="white" opacity="0.3"/>
  <!-- Magic hat -->
  <g transform="translate(155, 60)">
    <ellipse cx="45" cy="80" rx="45" ry="12" fill="#1e293b" opacity="0.8"/>
    <rect x="15" y="20" width="60" height="60" rx="4" fill="#1e293b" opacity="0.9"/>
    <rect x="15" y="20" width="60" height="60" rx="4" fill="none" stroke="white" stroke-width="1.5" opacity="0.3"/>
    <ellipse cx="45" cy="20" rx="30" ry="8" fill="#1e293b" stroke="white" stroke-width="1.5" opacity="0.8"/>
    <!-- Ribbon -->
    <rect x="15" y="55" width="60" height="8" fill="#a855f7" opacity="0.7"/>
  </g>
  <!-- Stars / sparkles -->
  <g fill="white">
    <path d="M80 50 L82 56 L88 56 L83 60 L85 66 L80 62 L75 66 L77 60 L72 56 L78 56 Z" opacity="0.7"/>
    <path d="M310 40 L312 46 L318 46 L313 50 L315 56 L310 52 L305 56 L307 50 L302 46 L308 46 Z" opacity="0.6"/>
    <path d="M130 30 L131.5 34 L136 34 L132.5 37 L134 41 L130 38 L126 41 L127.5 37 L124 34 L128.5 34 Z" opacity="0.5"/>
    <path d="M270 70 L271.5 74 L276 74 L272.5 77 L274 81 L270 78 L266 81 L267.5 77 L264 74 L268.5 74 Z" opacity="0.5"/>
    <circle cx="60" cy="90" r="2" opacity="0.4"/>
    <circle cx="340" cy="95" r="2" opacity="0.4"/>
    <circle cx="180" cy="45" r="1.5" opacity="0.5"/>
    <circle cx="230" cy="50" r="1.5" opacity="0.5"/>
  </g>
  <!-- Wand -->
  <g transform="translate(215, 55) rotate(30)">
    <rect x="0" y="0" width="4" height="60" rx="2" fill="white" opacity="0.8"/>
    <rect x="-1" y="0" width="6" height="8" rx="3" fill="white" opacity="0.9"/>
  </g>
  <!-- Audience silhouette -->
  <path d="M0 230 Q50 218 100 225 Q150 212 200 222 Q250 210 300 224 Q350 215 400 228 L400 250 L0 250 Z" fill="white" opacity="0.1"/>
</svg>
