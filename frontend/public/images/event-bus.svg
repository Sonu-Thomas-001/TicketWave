<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4f46e5"/>
      <stop offset="100%" style="stop-color:#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Bus body -->
  <rect x="100" y="100" width="200" height="80" rx="12" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Windows -->
  <rect x="120" y="112" width="30" height="25" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="160" y="112" width="30" height="25" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="200" y="112" width="30" height="25" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="240" y="112" width="30" height="25" rx="4" fill="rgba(255,255,255,0.25)"/>
  <!-- Windshield -->
  <rect x="280" y="108" width="15" height="60" rx="6" fill="rgba(255,255,255,0.3)"/>
  <!-- Wheels -->
  <circle cx="145" cy="185" r="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="255" cy="185" r="12" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Road -->
  <rect x="50" y="195" width="300" height="3" rx="1" fill="rgba(255,255,255,0.1)"/>
  <text x="200" y="55" fill="white" font-family="Arial,sans-serif" font-size="20" font-weight="bold" text-anchor="middle" opacity="0.9">BUS</text>
  <text x="200" y="235" fill="white" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" opacity="0.5">Travel by road</text>
</svg>
