<svg xmlns="http://www.w3.org/2000/svg" width="400" height="250" viewBox="0 0 400 250">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0891b2"/>
      <stop offset="100%" style="stop-color:#2563eb"/>
    </linearGradient>
  </defs>
  <rect width="400" height="250" fill="url(#bg)"/>
  <!-- Train body -->
  <rect x="80" y="95" width="240" height="75" rx="10" fill="rgba(255,255,255,0.2)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <!-- Front nose -->
  <path d="M320 95 L350 132.5 L320 170 Z" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Windows -->
  <rect x="100" y="108" width="25" height="22" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="135" y="108" width="25" height="22" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="170" y="108" width="25" height="22" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="205" y="108" width="25" height="22" rx="4" fill="rgba(255,255,255,0.25)"/>
  <rect x="240" y="108" width="25" height="22" rx="4" fill="rgba(255,255,255,0.25)"/>
  <!-- Headlight -->
  <circle cx="345" cy="132" r="6" fill="rgba(255,255,255,0.35)"/>
  <!-- Rails -->
  <rect x="50" y="178" width="320" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
  <rect x="50" y="186" width="320" height="3" rx="1" fill="rgba(255,255,255,0.15)"/>
  <!-- Wheels -->
  <circle cx="120" cy="175" r="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="180" cy="175" r="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <circle cx="260" cy="175" r="8" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.3)" stroke-width="2"/>
  <text x="200" y="55" fill="white" font-family="Arial,sans-serif" font-size="20" font-weight="bold" text-anchor="middle" opacity="0.9">TRAIN</text>
  <text x="200" y="230" fill="white" font-family="Arial,sans-serif" font-size="12" text-anchor="middle" opacity="0.5">Travel by rail</text>
</svg>
