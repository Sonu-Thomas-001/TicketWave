  <line x1="70" y1="60" x2="70" y2="140" stroke="rgba(99,102,241,0.3)" stroke-width="2" stroke-dasharray="4,4"/>
  <text x="115" y="107" fill="#6366f1" font-family="Arial,sans-serif" font-size="16" font-weight="bold" text-anchor="middle">TW</text>
